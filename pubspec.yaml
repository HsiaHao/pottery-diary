name: pottery_diary
description: "A Flutter app for potters to document pieces across trimmed, bisque, and glaze-fired stages."
publish_to: 'none'

version: 1.0.0+2

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1

  # Local database
  drift: ^2.20.2
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0

  # Photos
  image_picker: ^1.1.2
  image_cropper: ^9.0.0
  photo_manager: ^3.3.0

dependency_overrides:
  # Pin iOS packages to pre-objective_c versions to avoid
  # framework load failure on iOS 26 simulator
  image_picker_ios: 0.8.12+2
  path_provider_foundation: 2.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Drift code generation
  drift_dev: ^2.20.2
  build_runner: ^2.4.12

flutter:
  uses-material-design: true
